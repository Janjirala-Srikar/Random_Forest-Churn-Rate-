<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Churn Analysis - Premier Bank</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bank-navy: #002147;
            --bank-gold: #c5a059;
            --paper-white: #fdfdfb;
            --text-dark: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #e5e5f7;
            background-image:
                radial-gradient(#d1d1d1 0.5px, transparent 0.5px),
                radial-gradient(#d1d1d1 0.5px, #fdfdfb 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            margin: 0;
            padding: 40px 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            background: var(--paper-white);
            padding: 50px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), inset 0 0 100px rgba(0,0,0,0.02);
            border: 1px solid #dcdcdc;
            position: relative;
        }

        .container::before {
            content: "\f19c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 420px;
            color: rgba(0,0,0,0.025);
            pointer-events: none;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--bank-gold);
            margin-bottom: 40px;
            padding-bottom: 20px;
        }

        .header h2 {
            font-family: 'Playfair Display', serif;
            color: var(--bank-navy);
            font-size: 32px;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .header p {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            font-style: italic;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--bank-navy);
            margin-bottom: 8px;
            display: block;
        }

        input, select {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 0;
            font-size: 14px;
            background: transparent;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            border-color: var(--bank-gold);
            outline: none;
            background: rgba(197,160,89,0.05);
        }

        button {
            grid-column: span 2;
            padding: 16px;
            background: var(--bank-navy);
            color: var(--bank-gold);
            border: 1px solid var(--bank-gold);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background: #003366;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .result {
            margin-top: 40px;
            padding: 25px;
            border-left: 5px solid var(--bank-gold);
            background: #f4f4f4;
            display: none;
            z-index: 1;
            position: relative;
        }

        .metrics {
            margin-top: 40px;
            padding: 30px;
            background: #fafafa;
            border-top: 2px solid var(--bank-gold);
        }

        .metrics h3 {
            font-family: 'Playfair Display', serif;
            color: var(--bank-navy);
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            font-size: 14px;
        }

        .roc {
            margin-top: 30px;
            text-align: center;
        }

        .roc img {
            max-width: 100%;
            border: 1px solid #ccc;
            background: white;
            padding: 10px;
        }

        @media (max-width: 650px) {
            .form-grid, .metric-grid {
                grid-template-columns: 1fr;
            }
            button {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Premier Bank & Co.</h2>
        <p>Advanced Customer Risk Assessment Division</p>
    </div>

    <!-- ================= FORM ================= -->
    <div class="form-grid">
        <div class="input-group"><label>Credit Rating Score</label><input type="number" id="CreditScore" value="650"></div>
        <div class="input-group"><label>Customer Age</label><input type="number" id="Age" value="40"></div>
        <div class="input-group"><label>Account Tenure</label><input type="number" id="Tenure" value="5"></div>
        <div class="input-group"><label>Current Ledger Balance</label><input type="number" id="Balance" value="50000"></div>
        <div class="input-group"><label>Active Services</label><input type="number" id="NumOfProducts" value="2"></div>
        <div class="input-group"><label>Annual Salary (Est)</label><input type="number" id="EstimatedSalary" value="60000"></div>

        <div class="input-group">
            <label>Credit Instrument</label>
            <select id="HasCrCard"><option value="1">Holder</option><option value="0">Non-Holder</option></select>
        </div>

        <div class="input-group">
            <label>Engagement Status</label>
            <select id="IsActiveMember"><option value="1">Active</option><option value="0">Inactive</option></select>
        </div>

        <div class="input-group">
            <label>Gender Identification</label>
            <select id="Gender"><option value="Male">Male</option><option value="Female">Female</option></select>
        </div>

        <div class="input-group">
            <label>Regional Branch</label>
            <select id="Geography">
                <option value="France">France Branch</option>
                <option value="Germany">Germany Branch</option>
                <option value="Spain">Spain Branch</option>
            </select>
        </div>

        <button onclick="predictChurn()">Generate Risk Report</button>
    </div>

    <!-- ================= RESULT ================= -->
    <div class="result" id="result"></div>

    <!-- ================= METRICS ================= -->
    <div class="metrics">
        <h3>Model Performance Summary</h3>
        <div class="metric-grid">
            <div><b>Accuracy:</b> {{ accuracy }}</div>
            <div><b>Precision:</b> {{ precision }}</div>
            <div><b>Recall:</b> {{ recall }}</div>
            <div><b>ROC AUC:</b> {{ roc_auc }}</div>
        </div>

        <div class="roc">
            <h3>ROC Curve</h3>
            <img src="{{ url_for('static', filename='roc_curve.png') }}?v={{ roc_auc }}"alt="ROC Curve">
        </div>
    </div>

</div>

<script>
function predictChurn() {
    const data = {
        CreditScore: +CreditScore.value,
        Age: +Age.value,
        Tenure: +Tenure.value,
        Balance: +Balance.value,
        NumOfProducts: +NumOfProducts.value,
        HasCrCard: +HasCrCard.value,
        IsActiveMember: +IsActiveMember.value,
        EstimatedSalary: +EstimatedSalary.value,
        Gender: Gender.value,
        Geography: Geography.value
    };

    fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
        result.style.display = "block";
        result.innerHTML = `
            <h3 style="color:#002147">Official Risk Assessment</h3>
            <b>Churn Probability:</b> ${(res.churn_probability * 100).toFixed(2)}%<br>
            <b>System Verdict:</b> ${res.prediction}<br>
            <small>Confidence Threshold: ${res.threshold}</small>
        `;
    });
}
</script>

</body>
</html>
